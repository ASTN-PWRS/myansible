slim_project_name: slim-app
slim_project_root: "{{ ansible_user_dir }}/projects/{{ slim_project_name }}"
slim_public_root: "{{ slim_project_root }}/public"

nginx_listen_port: 9000
php_version: "8.3"
php_fpm_socket: "/run/php/php{{ php_version }}-fpm.sock"

garnet_port: 6379

webapps:
  - name: node-server
    type: express
    repo: "https://github.com/asao/api-server.git"
    dest: "{{ ansible_user_dir }}/projects/api-server"
    entry: "app.js"
    node_port: 3001
    listen_port: 9001

  - name: slim-app
    type: slim
    repo: "https://github.com/asao/slim-app.git"
    dest: "{{ ansible_user_dir }}/projects/slim-app"
    public: "{{ ansible_user_dir }}/projects/slim-app/public"
    listen_port: 9100

  - name: laravel-app
    type: laravel
    repo: "https://github.com/asao/laravel-app.git"
    dest: "{{ ansible_user_dir }}/projects/laravel-app"
    public: "{{ ansible_user_dir }}/projects/laravel-app/public"
    listen_port: 9200

  - name: vue-frontend
    type: vue
    repo: "https://github.com/asao/vue-frontend.git"
    dest: "{{ ansible_user_dir }}/projects/vue-frontend"
    build_dir: "dist"
    listen_port: 9300
