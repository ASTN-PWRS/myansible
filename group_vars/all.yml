slim_project_name: slim-app
slim_project_root: "{{ ansible_user_dir }}/projects/{{ slim_project_name }}"
slim_public_root: "{{ slim_project_root }}/public"

nginx_listen_port: 9000
php_version: "8.3"
php_fpm_socket: "/run/php/php{{ php_version }}-fpm.sock"

garnet_port: 6379

# PostgreSQL
postgresql_version: 18
postgresql_listen_addresses: "localhost"
postgresql_port: 5432
postgresql_password: "StrongPasswordHere"
# backup
postgresql_backup_dir: "/var/backups/postgresql"
postgresql_backup_keep_days: 10
postgresql_backup_time: "03:00"
postgresql_backup_databases:
  - name: appdb
    user: postgres
  - name: analytics
    user: postgres
  - name: logs
    user: postgres
