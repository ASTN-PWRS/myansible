#
uv_install_dir: "/opt/uv"
uv_venv_dir: "/opt/uv/default"
# Nginx
nginx_listen_port: 3000
# php
php_version: "8.3"
php_fpm_socket: "/run/php/php{{ php_version }}-fpm.sock"
# garnet
garnet_port: 6379
# PostgreSQL
postgresql_version: 18
postgresql_listen_addresses: "localhost"
postgresql_port: 5432
postgresql_password: "StrongPasswordHere"
# node
ansible_user: "asao"
# backup
postgresql_backup_dir: "/mnt/d/storages/backups/postgresql"
postgresql_backup_keep_days: 10
postgresql_backup_time: "03:00"
postgresql_backup_databases:
  - name: appdb
    user: postgres
  - name: analytics
    user: postgres
  - name: logs
    user: postgres
