# Databaseとテーブル作成
---
- name: Find application directories under files/sql (local)
  find:
    paths: "{{ playbook_dir }}/roles/ocr/files/sql"
    file_type: directory
    depth: 1
  register: sql_dirs
  delegate_to: localhost
  run_once: true
  tags: install

- name: Create PostgreSQL databases using psql (safe method)
  become: yes
  become_method: sudo
  shell: |
    sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='{{ item.path | basename }}'" | grep -q 1 \
    || sudo -u postgres psql -c "CREATE DATABASE \"{{ item.path | basename }}\";"
  loop: "{{ sql_dirs.files }}"
  tags: install
- name: Install pgvector
  apt:
    name: postgresql-18-pgvector
    state: present
  tags: [sql, install]
