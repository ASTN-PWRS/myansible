# ============================
# 1. Python (apt) のインストール
# ============================
- name: Install system Python and build tools
  apt:
    name:
      - python3
      - python3-venv
      - python3-pip
      - python3-dev
      - build-essential
    state: present
    update_cache: yes
  tags:
    - python
    - python_install
    - install

# ============================
# 1.5 python → python3 alias
# ============================
- name: Create python alias to python3
  file:
    src: /usr/bin/python3
    dest: /usr/local/bin/python
    state: link
  tags:
    - python
    - python_install
    - python_alias

# ============================
# 2. uv のインストール
# ============================
- name: Install uv
  shell: curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    creates: /root/.local/bin/uv
  tags:
    - python
    - python_install
    - install

# ============================
# 3. グローバル uv venv の作成
# ============================
- name: Create uv install directory
  file:
    path: "{{ uv_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - python
    - python_install
    - install

- name: Create global uv venv
  command: >
    /root/.local/bin/uv venv {{ uv_venv_dir }}
  args:
    creates: "{{ uv_venv_dir }}/bin/python"
  tags:
    - python
    - python_install
    - install

# ============================
# 4. uv pip でパッケージをインストール
# ============================
- name: Install uvicorn into global uv venv
  command: >
    /root/.local/bin/uv pip install --python {{ uv_venv_dir }}/bin/python uvicorn
  args:
    creates: "{{ uv_venv_dir }}/bin/uvicorn"

- name: Add uv,python to global PATH
  copy:
    dest: /etc/profile.d/uv.sh
    mode: "0755"
    owner: root
    group: root
    content: |
      export PATH="/root/.local/bin:$PATH"
  tags:
    - uv
    - uv_install
    - install
