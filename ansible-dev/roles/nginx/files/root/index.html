<!doctype html>
<html lang="ja" class="wa-theme-awesome wa-dark">
  <head>
    <meta charset="UTF-8" />
    <title>Theme Toggle</title>

    <!-- Web Awesome -->
    <link rel="stylesheet" href="/share/webawesome/styles/webawesome.css" />
    <link rel="stylesheet" href="/share/webawesome/styles/themes/awesome.css" />
    <link rel="stylesheet" href="/share/css/fonts.css" />
    <script type="module">
      import "/share/webawesome/webawesome.js";
    </script>

    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <wa-page>
      <!-- ヘッダー -->
      <header slot="header">
        <strong>MyApp</strong>

        <wa-button id="themeToggle" appearance="plain" style="cursor: pointer"
          >☀️</wa-button
        >
      </header>

      <!-- メイン -->
      <main>
        <wa-card>テーマ切り替えデモ</wa-card>
        <div class="content"></div>
      </main>

      <!-- フッター -->
      <footer slot="footer">© 2026</footer>
    </wa-page>

    <script>
      const btn = document.getElementById("themeToggle");
      const root = document.documentElement;

      // 初期化
      const saved = localStorage.getItem("theme");

      if (saved === "light") {
        root.classList.remove("wa-dark");
        root.classList.add("wa-light");
      } else {
        root.classList.remove("wa-light");
        root.classList.add("wa-dark");
      }

      updateLabel();

      btn.addEventListener("click", () => {
        const isDark = root.classList.contains("wa-dark");

        if (isDark) {
          root.classList.remove("wa-dark");
          root.classList.add("wa-light");
          localStorage.setItem("theme", "light");
        } else {
          root.classList.remove("wa-light");
          root.classList.add("wa-dark");
          localStorage.setItem("theme", "dark");
        }

        updateLabel();
      });

      function updateLabel() {
        const isDark = root.classList.contains("wa-dark");
        btn.textContent = isDark ? "☀️" : "🌙";
      }
    </script>
  </body>
</html>
