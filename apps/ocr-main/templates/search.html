<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>全文検索</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 40px;
      }
      .result {
        margin-bottom: 25px;
        padding: 10px;
        border-bottom: 1px solid #ccc;
      }
      .snippet {
        color: #444;
        margin-top: 5px;
      }
      em {
        background: yellow;
        font-style: normal;
      }
    </style>
  </head>
  <body>
    <h2>全文検索</h2>

    <form method="GET" action="/search">
      <input
        type="text"
        name="q"
        size="40"
        placeholder="検索ワードを入力"
        value="{{ q }}"
      />
      <button type="submit">検索</button>
    </form>

    <hr />

    {% if results %}
    <h3>検索結果（{{ results|length }} 件）</h3>

    {% for r in results %}
    <div class="result">
      <div>
        <strong>{{ r.file_name }}</strong>（{{ r.page_number }} ページ）
      </div>
      <div class="snippet">{{ r.snippet|safe }}</div>
    </div>
    {% endfor %} {% endif %}
  </body>
</html>
