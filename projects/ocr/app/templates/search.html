<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>OCR 全文検索</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 40px;
      }
      #results {
        margin-top: 24px;
      }
      .item {
        padding: 12px;
        border-bottom: 1px solid #ddd;
      }
      .page {
        color: #888;
        font-size: 12px;
      }
      pre {
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>OCR 全文検索</h1>

    <form id="search-form">
      <input id="query" type="text" placeholder="検索ワード" size="40" />
      <button type="submit">検索</button>
    </form>

    <div id="results"></div>

    <script>
      const form = document.getElementById("search-form");
      const resultsEl = document.getElementById("results");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const q = document.getElementById("query").value.trim();
        if (!q) return;

        resultsEl.innerHTML = "検索中...";

        const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();

        let html = `<h2>検索結果 (${data.results.length} 件)</h2>`;
        for (const row of data.results) {
          html += `
          <div class="item">
            <div><strong>${row.filename}</strong></div>
            <div class="page">page ${row.page_number}</div>
            <pre>${row.text}</pre>
          </div>
        `;
        }
        resultsEl.innerHTML = html;
      });
    </script>
  </body>
</html>
