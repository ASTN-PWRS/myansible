---
- name: Ensure app directory exists
  ansible.builtin.file:
    path: "{{ fastapi_app_dir }}"
    state: directory
    owner: "{{ fastapi_user }}"
    group: "{{ fastapi_user }}"
    mode: "0755"

- name: Sync local FastAPI project to server
  ansible.builtin.synchronize:
    src: "{{ fastapi_local_src }}/"
    dest: "{{ fastapi_app_dir }}/"
    delete: yes
    rsync_opts:
      - "--exclude=.venv"
      - "--exclude=__pycache__"

- name: Create venv
  ansible.builtin.command: python3 -m venv {{ fastapi_app_dir }}/venv
  args:
    creates: "{{ fastapi_app_dir }}/venv/bin/activate"

- name: Install dependencies
  ansible.builtin.command: >
    {{ fastapi_app_dir }}/venv/bin/pip install -r {{ fastapi_app_dir }}/requirements.txt
  when: fastapi_requirements | default(true)

- name: Deploy systemd service
  ansible.builtin.template:
    src: fastapi.service.j2
    dest: /etc/systemd/system/{{ fastapi_service_name }}.service
    mode: "0644"
  notify: Reload systemd
