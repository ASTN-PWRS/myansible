---
- name: Install .NET SDK 10
  apt:
    name:
      - dotnet-sdk-10.0
    state: present
    update_cache: yes
  tags:
    - garnet
    - garnet_install
    - install

- name: Clone Garnet repository
  git:
    repo: "https://github.com/microsoft/garnet.git"
    dest: "/opt/garnet"
    version: main
  tags:
    - garnet
    - garnet_install
    - install

- name: Build Garnet
  shell: |
    cd /opt/garnet
    dotnet publish ./main/GarnetServer/GarnetServer.csproj -c Release -f net10.0 -o /opt/garnet/build
  args:
    creates: /opt/garnet/build/GarnetServer
  tags:
    - garnet
    - garnet_install
    - install

- name: Create Garnet config directory
  file:
    path: /etc/garnet
    state: directory
    mode: "0755"
  tags:
    - garnet
    - garnet_install
    - install

- name: Deploy Garnet config.json
  template:
    src: config.json.j2
    dest: /etc/garnet/config.json
  tags:
    - garnet
    - garnet_install
    - install

- name: Deploy systemd service
  template:
    src: garnet.service.j2
    dest: /etc/systemd/system/garnet.service
  tags:
    - garnet
    - garnet_install
    - install

- name: Reload systemd
  systemd:
    daemon_reload: yes
  tags:
    - garnet
    - garnet_install
    - install
