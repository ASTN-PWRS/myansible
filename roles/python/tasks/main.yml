---
# ============================
# 1. Python (apt) のインストール
# ============================
- name: Install system Python and build tools
  ansible.builtin.apt:
    name:
      - python3
      - python3-venv
      - python3-pip
      - python3-dev
      - build-essential
    state: present
    update_cache: yes

# ============================
# 2. uv のインストール
# ============================
- name: Install uv
  ansible.builtin.shell: curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    creates: /root/.local/bin/uv

# PATH に uv を追加
- name: Add uv to PATH
  ansible.builtin.copy:
    dest: /etc/profile.d/uv.sh
    content: |
      export PATH="$HOME/.local/bin:$PATH"
    owner: root
    group: root
    mode: "0755"

# ============================
# 3. グローバル uv venv の作成
# ============================
- name: Create uv install directory
  ansible.builtin.file:
    path: "{{ uv_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create global uv venv
  ansible.builtin.command: >
    /root/.local/bin/uv venv {{ uv_venv_dir }}
  args:
    creates: "{{ uv_venv_dir }}/bin/python"

# ============================
# 4. uv pip でパッケージをインストール
# ============================
- name: Install Python packages via uv
  ansible.builtin.command: >
    /root/.local/bin/uv pip install --python {{ uv_venv_dir }}/bin/python {{ item }}
  loop: "{{ uv_packages }}"
