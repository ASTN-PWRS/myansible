# install
# ansible-playbook site.yml --tags python_install
# uv更新
# ansible-playbook site.yml --tags python_config
# uv package更新
# ansible-playbook site.yml --tags maintenance
# 全体
# ansible-playbook site.yml --tags python

---
# ============================
# 1. Python (apt) のインストール
# ============================
- name: Install system Python and build tools
  apt:
    name:
      - python3
      - python3-venv
      - python3-pip
      - python3-dev
      - build-essential
    state: present
    update_cache: yes
  tags:
    - python
    - python_install

# ============================
# 2. uv のインストール
# ============================
- name: Install uv
  shell: curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    creates: /root/.local/bin/uv
  tags:
    - python
    - python_install

- name: Add uv to PATH
  copy:
    dest: /etc/profile.d/uv.sh
    content: |
      export PATH="$HOME/.local/bin:$PATH"
    owner: root
    group: root
    mode: "0755"
  tags:
    - python
    - python_config

# ============================
# 3. グローバル uv venv の作成
# ============================
- name: Create uv install directory
  file:
    path: "{{ uv_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - python
    - python_install

- name: Create global uv venv
  command: >
    /root/.local/bin/uv venv {{ uv_venv_dir }}
  args:
    creates: "{{ uv_venv_dir }}/bin/python"
  tags:
    - python
    - python_install

# ============================
# 4. uv pip でパッケージをインストール
# ============================
- name: Install Python packages via uv
  command: >
    /root/.local/bin/uv pip install --python {{ uv_venv_dir }}/bin/python {{ item }}
  loop: "{{ uv_packages }}"
  tags:
    - python
    - python_packages
