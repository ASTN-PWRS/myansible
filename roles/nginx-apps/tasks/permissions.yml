- name: Ensure home directory is accessible (execute only)
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}"
    mode: "0711"

- name: Ensure projects directory is accessible
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/projects"
    mode: "0711"

- name: Ensure app directory is accessible
  ansible.builtin.file:
    path: "{{ item.root | dirname }}"
    state: directory
    mode: "0711"

- name: Ensure app public directory is accessible
  ansible.builtin.file:
    path: "{{ app.root }}"
    mode: "0755"

- name: Set ownership for public files
  ansible.builtin.file:
    path: "{{ app.root }}"
    owner: "{{ ansible_user }}"
    group: "www-data"
    recurse: yes

- name: Set file permissions inside public
  ansible.builtin.find:
    paths: "{{ app.root }}"
    file_type: file
  register: public_files

- name: Apply 0644 to public files
  ansible.builtin.file:
    path: "{{ item.path }}"
    mode: "0644"
  loop: "{{ public_files.files }}"
