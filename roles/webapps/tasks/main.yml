# ============================
# 1. 各 webapp を type に応じて処理
# ============================
- name: Setup all webapps
  include_tasks: "{{ item.type }}.yml"
  loop: "{{ webapps }}"
  loop_control:
    loop_var: item

# ============================
# 2. nginx main reverse proxy
# ============================
- name: Deploy nginx main reverse proxy (port 9000)
  template:
    src: nginx-main.conf.j2
    dest: /etc/nginx/sites-available/main.conf

- name: Enable main nginx site
  file:
    src: /etc/nginx/sites-available/main.conf"
    dest: "/etc/nginx/sites-enabled/main.conf"
    state: link
    force: yes

# ============================
# 3. systemd reload（全アプリ共通）
# ============================
- name: Reload systemd
  systemd:
    daemon_reload: yes

# ============================
# 4. nginx reload（全アプリ共通）
# ============================
- name: Reload nginx
  systemd:
    name: nginx
    state: reloaded
