# ============================
# 1. Git clone / update
# ============================
- name: Clone or update Laravel app
  git:
    repo: "{{ item.repo }}"
    dest: "{{ item.dest }}"
    version: main
    force: yes

# ============================
# 2. Install PHP dependencies
# ============================
- name: Install PHP dependencies with Composer
  composer:
    command: install
    working_dir: "{{ item.dest }}"
    prefer_dist: yes
    optimize_autoloader: yes
    no_dev: yes

# ============================
# 3. Set Laravel permissions
# ============================
- name: Set permissions for storage
  file:
    path: "{{ item.dest }}/storage"
    state: directory
    recurse: yes
    owner: www-data
    group: www-data
    mode: "0755"

- name: Set permissions for bootstrap/cache
  file:
    path: "{{ item.dest }}/bootstrap/cache"
    state: directory
    recurse: yes
    owner: www-data
    group: www-data
    mode: "0755"

# ============================
# 4. Deploy nginx reverse proxy
# ============================
- name: Deploy nginx backend reverse proxy for Laravel
  template:
    src: laravel-nginx.conf.j2
    dest: "/etc/nginx/sites-available/{{ item.name }}.conf"

- name: Enable nginx site for Laravel
  file:
    src: "/etc/nginx/sites-available/{{ item.name }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ item.name }}.conf"
    state: link
    force: yes

# ============================
# 5. Restart PHP-FPM (Laravel only)
# ============================
- name: Restart PHP-FPM
  systemd:
    name: "php{{ php_version }}-fpm"
    state: restarted
