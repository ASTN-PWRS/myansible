webapps:
  # ============================
  # Express (Node.js)
  # ============================
  - name: node-server
    type: express
    repo: "https://github.com/asao/api-server.git"
    dest: "{{ ansible_user_dir }}/projects/api-server"
    entry: "app.js"
    node_port: 3001
    listen_port: 9001

  # ============================
  # Slim (PHP)
  # ============================
  - name: slim-app
    type: slim
    repo: "https://github.com/asao/slim-app.git"
    dest: "{{ ansible_user_dir }}/projects/slim-app"
    public: "{{ ansible_user_dir }}/projects/slim-app/public"
    listen_port: 9100

  # ============================
  # Laravel (PHP)
  # ============================
  - name: laravel-app
    type: laravel
    repo: "https://github.com/asao/laravel-app.git"
    dest: "{{ ansible_user_dir }}/projects/laravel-app"
    public: "{{ ansible_user_dir }}/projects/laravel-app/public"
    listen_port: 9200

  # ============================
  # Vue (Frontend)
  # ============================
  - name: vue-frontend
    type: vue
    repo: "https://github.com/asao/vue-frontend.git"
    dest: "{{ ansible_user_dir }}/projects/vue-frontend"
    build_dir: "dist"
    listen_port: 9300

  # ============================
  # FastAPI (Python / uvicorn)
  # ============================
  - name: fastapi-app
    type: fastapi
    repo: "https://github.com/asao/fastapi-app.git"
    dest: "{{ ansible_user_dir }}/projects/fastapi-app"
    module: "app.main"
    callable: "app"
    port: 9400
    domain: "fastapi.local"
    requirements: true
