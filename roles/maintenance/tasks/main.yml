---
# ============================
# 1. サービス停止
# ============================
- name: Stop Garnet
  systemd:
    name: garnet
    state: stopped

- name: Stop nginx
  systemd:
    name: nginx
    state: stopped

- name: Stop PHP-FPM
  systemd:
    name: "php{{ php_version }}-fpm"
    state: stopped

# ============================
# 2. Node.js (nvm) のアップデート
# ============================
- name: Load nvm
  shell: . /home/{{ ansible_user }}/.nvm/nvm.sh && nvm install --lts --reinstall-packages-from=current
  args:
    executable: /bin/bash

- name: Set default Node.js
  shell: . /home/{{ ansible_user }}/.nvm/nvm.sh && nvm alias default lts/*
  args:
    executable: /bin/bash

# ============================
# 3. Composer のアップデート
# ============================
- name: Update Composer
  command: composer self-update

# ============================
# 4. サービス再起動
# ============================
- name: Start PHP-FPM
  systemd:
    name: "php{{ php_version }}-fpm"
    state: started

- name: Start nginx
  systemd:
    name: nginx
    state: started

- name: Start Garnet
  systemd:
    name: garnet
    state: started
