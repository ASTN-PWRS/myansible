---
- name: Install PHP-FPM and extensions
  apt:
    name:
      - php-fpm
      - php-cli
      - php-mbstring
      - php-xml
      - php-curl
      - php-zip
      - php-intl
      - php-opcache
      - php-redis
    state: present
  tags:
    - php
    - php_install
    - install

- name: Deploy optimized php.ini
  template:
    src: php.ini.j2
    dest: "/etc/php/{{ php_version }}/fpm/php.ini"
  notify: restart php-fpm
  tags:
    - php
    - php_config

- name: Check if Redis extension is loaded
  command: php -m
  register: php_modules
  tags:
    - php
    - php_check

- name: Assert Redis is loaded
  assert:
    that: "'redis' in php_modules.stdout"
  tags:
    - php
    - php_check

# 🔥 ここから追加：php-fpm のサービス名を自動判定して起動

- name: Check if versioned php-fpm service exists
  stat:
    path: "/lib/systemd/system/php{{ php_version }}-fpm.service"
  register: php_fpm_versioned
  tags:
    - php
    - php_service

- name: Set php-fpm service name
  set_fact:
    php_fpm_service: "{{ 'php' + php_version + '-fpm' if php_fpm_versioned.stat.exists else 'php-fpm' }}"
  tags:
    - php
    - php_service

- name: Ensure php-fpm is started and enabled
  service:
    name: "{{ php_fpm_service }}"
    state: started
    enabled: yes
  tags:
    - php
    - php_service
