- hosts: local
  become: yes
  roles:
    - common # OS 基本設定
    - php # PHP-FPM + php.ini
    - nginx # nginx install
    - node # Node.js / nvm
    - composer # composer install
    - python # python + uv
    - postgresql # PostgreSQL install + config + backup
    - nginx-main # 9000番の振り分け（reverse proxy）
    - express # Express
    - fastapi # FastAPI
    - webapp # Slim / Laravel の backend 設定
    - maintenance # サービス停止・更新
